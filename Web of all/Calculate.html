<?php
$old_reading = '';
$new_reading = '';
$rate = 620;
$units = null;
$total = null;
$error = '';

if ($_SERVER['REQUEST_METHOD'] === 'POST') {
    $old_reading = $_POST['old_reading'] ?? '';
    $new_reading = $_POST['new_reading'] ?? '';
    $rate = floatval($_POST['rate'] ?? 620);

    if ($old_reading !== '' && $new_reading !== '') {
        $old = floatval($old_reading);
        $new = floatval($new_reading);

        if ($new < $old) {
            $error = 'លេខម៉ែត្រថ្មីត្រូវតែធំជាងលេខម៉ែត្រចាស់។';
        } else {
            $units = $new - $old;
            $total = $units * $rate;
        }
    }
}

function fmt_kh($n) {
    return number_format($n, 0, '.', ',');
}
?>
